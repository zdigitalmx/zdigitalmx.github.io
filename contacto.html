<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Zona Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            line-height: 1.6;
        }

        header {
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.95);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { color: var(--primary); font-weight: bold; text-decoration: none; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        nav a { color: var(--text); text-decoration: none; margin-left: 15px; font-size: 0.85rem; }

        .container { padding: 40px 5%; max-width: 900px; margin: 0 auto; }
        
        h1 { font-size: 2.2rem; text-align: center; margin-bottom: 10px; }
        .subtitle { color: var(--primary); text-align: center; display: block; margin-bottom: 40px; }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .contact-card {
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--border);
            text-align: center;
