<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zona Digital | Reparación de Consolas y Microelectrónica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #38bdf8;
            --secondary: #1e293b;
            --bg: #0f172a;
            --text: #f8fafc;
            --accent: #25d366;
            --header-height: 65px;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; line-height: 1.6; scroll-behavior: smooth; }

        /* Top Bar */
        .top-bar { 
            background: #020617; 
            padding: 8px 5%; 
            font-size: 0.85rem; 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 1px solid var(--secondary);
            color: #94a3b8;
        }

        /* Header Principal */
        header { 
            position: sticky; 
            top: 0; 
            background: #0f172a; 
            padding: 0 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--secondary); 
            z-index: 2000; 
            height: var(--header-height);
        }

        .logo { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            color: var(--text); 
            text-transform: uppercase; 
            text-decoration: none; 
        }
        .logo img { height: 35px; }
        
        /* Botón Hamburguesa Estilo BYD */
        .menu-btn { 
            width: 25px; 
            height: 18px; 
            display: none; 
            flex-direction: column; 
            justify-content: space-between; 
            cursor: pointer; 
        }
        .menu-btn span { display: block; height: 2px; width: 100%; background-color: var(--text); transition: 0.3s; }
        
        /* Animación X */
        .menu-btn.open span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .menu-btn.open span:nth-child(2) { opacity: 0; }
        .menu-btn.open span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        /* Navegación */
        nav { display: flex; gap: 25px; align-items: center; }
        nav a { color: var(--text); text-decoration: none; font-weight: 400; font-size: 0.9rem; transition: 0.3s; }
        nav a:hover { color: var(--primary); }
        
        .nav-socials { display: none; gap: 20px; margin-top: 20px; border-top: 1px solid var(--secondary); padding-top: 20px; }
        .nav-socials a { font-size: 1.5rem; color: var(--text); }

        /* Responsivo - Menú Lateral/Desplegable */
        @media (max-width: 992px) {
            .top-bar { display: none; }
            .menu-btn { display: flex; }
            
            nav {
                position: fixed; 
                top: var(--header-height); 
                left: 0; 
                width: 100%; 
                height: calc(100vh - var(--header-height)); 
                background: #0f172a;
                flex-direction: column; 
                justify-content: flex-start; 
                align-items: flex-start;
                padding: 40px 10%;
                gap: 0; 
                transform: translateX(100%); /* Se esconde a la derecha */
                transition: transform 0.4s ease-in-out; 
                z-index: 1500;
                box-sizing: border-box;
            }

            nav.open { transform: translateX(0); }

            nav a { 
                width: 100%;
                padding: 15px 0;
                font-size: 1.1rem; 
                border-bottom: 1px solid rgba(255,255,255,0.05);
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            
            /* Flecha estética tipo BYD */
            nav a::after { content: '+'; font-size: 1.2rem; color: #444; }

            .nav-socials { display: flex; }
        }

        /* Hero y demás secciones */
        .hero { padding: 80px 5%; text-align: center; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        #system-spec { margin-bottom: 2rem; font-size: 1rem; color: var(--primary); }
        #system-spec strong { color: #fff; }
        .btn-ws { display: inline-block; background: var(--accent); color: white; padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; }
        
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 40px 5%; }
        .card { background: var(--secondary); padding: 2rem; border-radius: 1rem; text-align: center; border: 1px solid #334155; }
        
        footer { text-align: center; padding: 40px 5%; color: #94a3b8; border-top: 1px solid var(--secondary); background: #020617; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="contact-info">
            <span><i class="fas fa-phone"></i> +52 55 6249 1653</span>
        </div>
        <div><i class="fas fa-clock"></i> Lun - Sáb</div>
    </div>

    <header>
        <a href="index.html" class="logo">
            <img src="img/logo_zd.png" alt="Zona Digital">
            <span>Zona Digital</span>
        </a>
        <div class="menu-btn" id="menuBtn">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav id="navMenu">
            <a href="index.html">Inicio</a>
            <a href="pregfrec.html">Preguntas Frecuentes</a>
            <a href="nosotros.html">Quiénes somos</a>
            <a href="servicios.html">Servicios</a>
            <a href="contacto.html">Contacto</a>
            
            <div class="nav-socials">
                <a href="https://www.facebook.com/ZonaDigital106" target="_blank"><i class="fab fa-facebook"></i></a>
                <a href="https://www.tiktok.com/@zd1322" target="_blank"><i class="fab fa-tiktok"></i></a>
            </div>
        </nav>
    </header>

    <section class="hero">
        <h1>Expertos en Microelectrónica</h1>
        <div id="system-spec">Cargando sistema...</div>
        <p>Reparación de consolas y micro-soldadura avanzada en CDMX.</p>
        <a href="https://wa.me/525562491653" target="_blank" class="btn-ws"><i class="fab fa-whatsapp"></i> WhatsApp </a>       
    </section>

    <script>
        // Detector de sistema
        function updateSystemSpecs() {
            const ua = navigator.userAgent;
            let os = "Android", equipo = "dispositivo móvil", browser = "Google Chrome";
            const target = document.getElementById('system-spec');
            target.innerHTML = `Detectamos que usas <strong>${os}</strong> en tu <strong>${equipo}</strong> con <strong>${browser}</strong>.`;
        }
        window.addEventListener('load', updateSystemSpecs);

        // Lógica del Menú
        const menuBtn = document.getElementById('menuBtn');
        const navMenu = document.getElementById('navMenu');

        menuBtn.addEventListener('click', () => {
            menuBtn.classList.toggle('open');
            navMenu.classList.toggle('open');
            // Bloquear scroll cuando el menú esté abierto
            document.body.style.overflow = navMenu.classList.contains('open') ? 'hidden' : 'auto';
        });
    </script>
</body>
</html>
