<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zona Digital | Reparación de Consolas y Microelectrónica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #38bdf8;
            --secondary: #1e293b;
            --bg: #0f172a;
            --text: #f8fafc;
            --accent: #25d366;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            overflow-x: hidden; 
        }

        /* Header */
        header { 
            position: sticky; 
            top: 0; 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(10px); 
            padding: 1rem 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--secondary); 
            z-index: 1000; 
        }
        
        .logo { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: var(--primary); 
            text-decoration: none; 
            z-index: 1100;
        }
        .logo img { height: 40px; }

        /* Botón Hamburguesa */
        .menu-btn { 
            width: 30px; 
            height: 22px; 
            position: relative; 
            cursor: pointer; 
            z-index: 2000; /* Por encima del nav */
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
        }
        .menu-btn span { 
            display: block; 
            height: 3px; 
            width: 100%; 
            background-color: var(--text); 
            border-radius: 3px; 
            transition: 0.3s ease-in-out; 
        }

        /* Animación a X */
        .menu-btn.open span:nth-child(1) { transform: translateY(9.5px) rotate(45deg); }
        .menu-btn.open span:nth-child(2) { opacity: 0; }
        .menu-btn.open span:nth-child(3) { transform: translateY(-9.5px) rotate(-45deg); }

        /* Menú Navegación (Efecto de aparición) */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #0f172a; /* Color sólido para evitar transparencias raras */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1500;
            
            /* Estado oculto */
            opacity: 0;
            pointer-events: none; /* No clickable mientras es invisible */
            transition: opacity 0.4s ease;
        }

        nav.open {
            opacity: 1;
            pointer-events: auto;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-size: 1.8rem;
            margin: 15px 0;
            font-weight: 500;
            transition: 0.3s;
            opacity: 0;
            transform: translateY(20px);
        }

        nav.open a {
            opacity: 1;
            transform: translateY(0);
            /* Retraso progresivo para cada enlace */
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        /* Retrasos para el efecto visual */
        nav.open a:nth-child(1) { transition-delay: 0.1s; }
        nav.open a:nth-child(2) { transition-delay: 0.2s; }
        nav.open a:nth-child(3) { transition-delay: 0.3s; }
        nav.open a:nth-child(4) { transition-delay: 0.4s; }
        nav.open a:nth-child(5) { transition-delay: 0.5s; }
        nav.open a:nth-child(6) { transition-delay: 0.6s; }

        nav a:hover { color: var(--primary); }

        /* Contenido Hero */
        .hero { padding: 80px 5%; text-align: center; }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; }
        .btn-ws { display: inline-block; background: var(--accent); color: white; padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; }

    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <img src="img/logo_zd.png" alt="Logo">
            <span>Zona Digital</span>
        </a>

        <div class="menu-btn" id="menuBtn">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <nav id="navMenu">
            <a href="index.html">Inicio</a>
            <a href="pregfrec.html">Preguntas Frecuentes</a>
            <a href="nosotros.html">Quiénes somos</a>
            <a href="servicios.html">Servicios</a>
            <a href="galeria.html">Galería</a>
            <a href="contacto.html">Contacto</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Expertos en Microelectrónica</h1>
        <p>Especialistas en reparación de consolas, laptops y micro-soldadura en la CDMX.</p>
        <a href="https://wa.me/525562491653" target="_blank" class="btn-ws">
            <i class="fab fa-whatsapp"></i> Envíanos un WhatsApp 
        </a>       
    </section>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const navMenu = document.getElementById('navMenu');

        menuBtn.addEventListener('click', () => {
            menuBtn.classList.toggle('open');
            navMenu.classList.toggle('open');
            
            // Evitar que la página de atrás se mueva
            if (navMenu.classList.contains('open')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        });

        // Cerrar al hacer clic en un enlace
        const links = document.querySelectorAll('nav a');
        links.forEach(link => {
            link.addEventListener('click', () => {
                menuBtn.classList.remove('open');
                navMenu.classList.remove('open');
                document.body.style.overflow = 'auto';
            });
        });
    </script>
</body>
</html>
