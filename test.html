<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zona Digital | Reparación de Consolas y Microelectrónica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #38bdf8;
            --secondary: #1e293b;
            --bg: #0f172a;
            --text: #f8fafc;
            --accent: #25d366;
            --header-bg: #0b132b;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            line-height: 1.6; 
            overflow-x: hidden; 
            /* 1. Agregamos padding superior para que el contenido no quede oculto bajo el header fijo */
            padding-top: 110px; 
        }

        /* Contenedor principal del menú para fijarlo arriba */
        .navbar-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10000; /* Prioridad máxima */
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Top Bar */
        .top-bar { 
            background: #020617; 
            padding: 8px 5%; 
            font-size: 0.85rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--secondary); 
        }

        .top-contact { display: flex; align-items: center; gap: 8px; color: #94a3b8; }
        .top-contact i { color: var(--primary); }
        .top-contact a { color: inherit; text-decoration: none; transition: 0.3s; }
        .top-contact a:hover { color: var(--primary); }

        .top-socials { display: flex; gap: 20px; }
        .top-socials a { color: #94a3b8; font-size: 1rem; transition: 0.3s; text-decoration: none; }
        .top-socials a.fb:hover { color: #1877F2; } 
        .top-socials a.tk:hover { color: #ff0050; }

        /* Header Principal */
        header { 
            background: var(--header-bg); 
            backdrop-filter: blur(10px); 
            padding: 0.8rem 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .logo { display: flex; align-items: center; gap: 12px; font-size: 1.5rem; font-weight: bold; color: var(--primary); text-decoration: none; text-transform: uppercase; }
        .logo img { height: 40px; width: auto; }

        /* Desktop Nav */
        nav { display: flex; align-items: center; }
        nav a { color: var(--text); text-decoration: none; margin-left: 25px; font-weight: 500; transition: 0.3s; font-size: 0.95rem; }
        nav a:hover { color: var(--primary); }

        /* Mobile Menu Toggle */
        .menu-toggle { display: none; font-size: 1.5rem; color: var(--text); cursor: pointer; }

        /* Responsive Mobile */
        @media (max-width: 992px) {
            body { padding-top: 100px; } /* Ajuste de espacio para móvil */

            .menu-toggle { display: block; }

            nav {
                position: fixed;
                top: 100px; /* Se despliega justo debajo del header fijo */
                right: -100%; 
                background: var(--header-bg);
                flex-direction: column;
                width: 80%;
                height: calc(100vh - 100px);
                transition: 0.4s ease;
                padding: 2rem;
                border-left: 1px solid var(--secondary);
                box-shadow: -10px 0 20px rgba(0,0,0,0.5);
                z-index: 9999;
            }

            nav.active { right: 0; }

            nav a {
                margin: 15px 0;
                font-size: 1.2rem;
                width: 100%;
                border-bottom: 1px solid var(--secondary);
                padding-bottom: 10px;
                margin-left: 0;
            }
        }

        @media (max-width: 480px) {
            .top-bar { padding: 5px 5%; }
            .top-contact span { font-size: 0.75rem; }
            body { padding-top: 115px; }
        }

        /* Hero Section */
        .hero { 
            padding: 80px 5%; 
            text-align: center; 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); 
            min-height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin-bottom: 1rem; color: white; }
        .hero p { font-size: 1.1rem; color: #94a3b8; max-width: 800px; margin: 0 auto 2rem; }
        
        .btn-ws { 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            background: var(--accent); 
            color: white; 
            padding: 14px 30px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: bold; 
            transition: 0.3s;
        }
        .btn-ws:hover { transform: scale(1.05); background: #20ba5a; }
    </style>
</head>
<body>

    <div class="navbar-fixed">
        <div class="top-bar">
            <div class="top-contact">
                <i class="fas fa-phone-alt"></i> 
                <span>Llámanos: <a href="tel:+525562491653">55 6249 1653</a></span>
            </div>
            
            <div class="top-socials">
                <a href="#" class="fb" target="_blank" title="Facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="tk" target="_blank" title="TikTok"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>

        <header>
            <a href="index.html" class="logo">
                <img src="img/logo_zd.png" alt="ZD">
                <span>Zona Digital</span>
            </a>

            <div class="menu-toggle" id="mobile-menu">
                <i class="fas fa-bars"></i>
            </div>

            <nav id="nav-menu">
                <a href="index.html">Inicio</a>
                <a href="pregfrec.html">Preguntas</a>
                <a href="nosotros.html">Nosotros</a>
