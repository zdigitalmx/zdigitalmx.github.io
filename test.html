    <style>
        :root {
            --primary: #38bdf8;
            --secondary: #1e293b;
            --bg: #0f172a;
            --text: #f8fafc;
            --text-muted: #cbd5e1;
            --accent: #25d366;
            --header-height: 70px;
        }

        /* Reset y Base */
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            line-height: 1.6; 
            overflow-x: hidden;
        }

        /* Top Bar */
        .top-bar { 
            background: #020617; 
            padding: 8px 5%; 
            font-size: 0.85rem; 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 1px solid var(--secondary);
            color: var(--text-muted);
        }

        /* Header */
        header { 
            position: sticky; 
            top: 0; 
            background: #0f172a; 
            padding: 0 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--secondary); 
            z-index: 2000; 
            height: var(--header-height);
        }

        .logo { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            color: var(--text); 
            text-transform: uppercase; 
            text-decoration: none; 
        }
        .logo img { height: 40px; }
        
        /* Navigation */
        nav { display: flex; gap: 25px; align-items: center; }
        nav a { color: var(--text); text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: 0.3s; }
        nav a:hover { color: var(--primary); }

        /* Menu Button Mobile */
        .menu-btn { 
            width: 25px; height: 18px; display: none; flex-direction: column; justify-content: space-between; cursor: pointer; z-index: 2100;
        }
        .menu-btn span { display: block; height: 2px; width: 100%; background-color: var(--text); transition: 0.3s; }

        /* Hero Section */
        .hero { 
            padding: 100px 5%; 
            text-align: center; 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); 
        }
        .hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin-bottom: 0.5rem; color: #fff; }
        #system-spec { margin-bottom: 2rem; color: var(--primary); font-size: 1.1rem; min-height: 1.6em; }
        #system-spec strong { color: #fff; border-bottom: 1px solid var(--primary); }
        
        .btn-ws { 
            display: inline-block; background: var(--accent); color: white; padding: 16px 40px; border-radius: 50px; 
            text-decoration: none; font-weight: bold; transition: 0.3s; font-size: 1.1rem;
        }
        .btn-ws:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3); }

        /* Services Grid */
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 80px 5%; }
        .card { 
            background: var(--secondary); padding: 3rem 2rem; border-radius: 1.5rem; border: 1px solid #334155; 
            text-align: center; transition: all 0.3s ease;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        .card i { font-size: 3rem; color: var(--primary); margin-bottom: 1.5rem; }
        .card h2 { font-size: 1.5rem; margin-bottom: 1rem; color: #fff; }
        .card p { color: var(--text-muted); font-size: 0.95rem; }

        /* Map Section */
        .map-section { padding: 80px 5%; text-align: center; background: #0b1121; }
        .map-container { 
            border-radius: 1.5rem; overflow: hidden; border: 1px solid var(--secondary); 
            max-width: 1100px; margin: 30px auto; height: 450px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .map-container iframe { width: 100%; height: 100%; border: 0; }

        /* Footer */
        footer { text-align: center; padding: 60px 5%; color: var(--text-muted); border-top: 1px solid var(--secondary); background: #020617; }
        .social-links { margin-bottom: 25px; display: flex; justify-content: center; gap: 30px; }
        .social-links a { color: var(--text); font-size: 1.8rem; transition: 0.3s; }
        .social-links a:hover { color: var(--primary); transform: scale(1.2); }

        /* Mobile Adjustments */
        @media (max-width: 992px) {
            .top-bar { display: none; }
            .menu-btn { display: flex; }
            nav {
                position: fixed; top: var(--header-height); right: -100%; width: 100%; height: calc(100vh - var(--header-height)); 
                background: #0f172a; flex-direction: column; padding: 40px 10%; transition: 0.4s; z-index: 1900;
            }
            nav.open { right: 0; }
            nav a { width: 100%; padding: 20px 0; font-size: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        }
    </style>
