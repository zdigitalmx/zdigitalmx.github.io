<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zona Digital | Servicios Especializados</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="img/logo_zd.png">

    <style>
        /* --- VARIABLES GLOBALES --- */
        :root {
            --primary: #38bdf8;
            --secondary: #1e293b;
            --bg: #0f172a;
            --text: #f8fafc;
            --accent: #25d366;
            --card: #1e293b;
            --border: #334155;
            --header-bg: #020617;
        }

        /* --- RESET Y BASE --- */
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            line-height: 1.6; 
        }

        /* --- TOP BAR --- */
        .top-bar { 
            background: var(--header-bg); 
            padding: 10px 5%; 
            font-size: 0.85rem; 
            display: flex; 
            justify-content: space-between; 
            flex-wrap: wrap; 
            border-bottom: 1px solid var(--secondary); 
        }
        .top-bar div { margin-right: 20px; color: #94a3b8; }
        .top-bar i { color: var(--primary); margin-right: 5px; }

        /* --- HEADER Y NAVEGACIÓN --- */
        header { 
            position: sticky; 
            top: 0; 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(10px); 
            padding: 1rem 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--secondary); 
            z-index: 1000; 
        }

        .logo { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            font-size: 1.8rem; 
            font-weight: bold; 
            color: var(--primary); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            text-decoration: none;
        }
        .logo img { height: 45px; width: auto; border-radius: 5px; }
        
        nav a { color: var(--text); text-decoration: none; margin-left: 20px; font-weight: 500; transition: 0.3s; }
        nav a:hover, nav a.active { color: var(--primary); }

        /* --- CONTENEDOR PRINCIPAL --- */
        .container { max-width: 1200px; margin: 60px auto; padding: 0 20px; }
