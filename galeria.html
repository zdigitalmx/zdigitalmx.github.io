<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zona Digital | Galería de Ingeniería</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="img/logo_zd.png">

    <style>
        :root {
            --primary: #38bdf8;
            --bg: #0f172a;
            --text: #f8fafc;
            --card: #1e293b;
            --secondary: #1e293b;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header { 
            position: sticky; 
            top: 0; 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(10px); 
            padding: 1rem 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--secondary); 
            z-index: 1000; 
        }

        .logo { display: flex; align-items: center; gap: 12px; font-size: 1.5rem; font-weight: bold; color: var(--primary); text-decoration: none; text-transform: uppercase; }
        .logo img { height: 40px; }
        
        nav a { color: var(--text); text-decoration: none; margin-left: 20px; font-weight: 500; }
        nav a:hover { color: var(--primary); }

        .container { flex: 1; max-width: 1200px; margin: 40px auto; padding: 0 20px; text-align: center; }
        
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { color: var(--primary); font-size: 1.1rem; margin-bottom: 40px; }

        /* Carrusel Horizontal */
        .video-carousel {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 20px 0;
            scroll-snap-type: x mandatory;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        .video-carousel::-webkit-scrollbar { height: 6px; }
        .video-carousel::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .video-card {
            min-width: 300px;
            max-width: 300px;
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
            scroll-snap-align: start;
            transition: transform 0.3s ease;
        }

        .video-card:hover { transform: translateY(-5px); border-color: var(--primary); }

        video { width: 100%; aspect-ratio: 16/9; background: #000; display: block; }

        .video-info { padding: 15px; font-size: 0.85rem; color: #94a3b8; text-align: left; }

        @media (max-width: 768px) {
            .video-card { min-width: 280px; }
            header { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <img src="img/logo_zd.png" alt="Logo ZDigital">
            <span>Zona Digital</span>
        </a>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="nosotros.html">Quiénes somos</a>
            <a href="galeria.html" style="color: var(--primary);">Galería</a>
        </nav>
    </header>

    <main class="container">
        <h1>Galería de Ingeniería</h1>
        <p class="subtitle">Evidencia técnica de micro-soldadura y reparaciones avanzadas.</p>

        <div class="video-carousel">
            <div class="video-card">
                <video controls preload="metadata" class="reparacion-video">
                    <source src="img/galeria/Download (46).mp4" type="video/mp4">
                </video>
                <div class="video-info"><i class="fas fa-microchip"></i> Reparación de Hardware #46</div>
            </div>

            <div class="video-card">
                <video controls preload="metadata" class="reparacion-video">
                    <source src="img/galeria/Download (47).mp4" type="video/mp4">
                </video>
                <div class="video-info"><i class="fas fa-bolt"></i> Micro-soldadura #47</div>
            </div>

            <div class="video-card">
                <video controls preload="metadata" class="reparacion-video">
                    <source src="img/galeria/Download (48).mp4" type="video/mp4">
                </video>
                <div class="video-info"><i class="fas fa-microscope"></i> Análisis de Placa #48</div>
            </div>
        </div>
        
        <p style="margin-top: 40px; color: #64748b; font-size: 0.9rem;">
            <i class="fas fa-mouse-pointer"></i> Desliza para ver más videos.
        </p>
    </main>

    <script>
        const videos = document.querySelectorAll('.reparacion-video');
        videos.forEach(video => {
            video.addEventListener('play', function() {
                if (video.requestFullscreen) { video.requestFullscreen(); }
                else if (video.webkitRequestFullscreen) { video.webkitRequestFullscreen(); }
            });
        });
    </script>

    <footer style="text-align: center; padding: 30px; color: #475569; font-size: 0.8rem; border-top: 1px solid var(--secondary);">
        &copy; Zona Digital. Av. México 1322, CDMX
    </footer>

</body>
</html>
