<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zona Digital | Galería Técnica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="img/logo_zd.png">

    <style>
        :root {
            --primary: #38bdf8;
            --bg: #0f172a;
            --text: #f8fafc;
            --card: #1e293b;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
        }

        header { 
            background: rgba(15, 23, 42, 0.9); 
            padding: 1rem 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #1e293b;
        }

        .logo { display: flex; align-items: center; gap: 10px; color: var(--primary); text-decoration: none; font-weight: bold; }
        .logo img { height: 35px; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; text-align: center; }
        
        /* Carrusel Horizontal - Estilo Primera Captura */
        .video-carousel {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 20px 0;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .video-carousel::-webkit-scrollbar { height: 5px; }
        .video-carousel::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .video-card {
            min-width: 320px;
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            scroll-snap-align: start;
            border: 1px solid #334155;
        }

        video { 
            width: 100%; 
            aspect-ratio: 16/9; 
            display: block; 
            background: #000;
        }

        .video-info { 
            padding: 12px; 
            background: #1e293b; 
            font-size: 0.9rem; 
            text-align: left;
            border-top: 1px solid #334155;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <img src="img/logo_zd.png" alt="ZD">
            <span>ZONA DIGITAL</span>
        </a>
    </header>
