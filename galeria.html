
<style>
    /* ... (mantén el resto del CSS igual hasta .video-carousel) ... */

    .video-carousel {
        display: flex;
        gap: 15px;
        overflow-x: auto;
        padding: 20px 0;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
    }

    .video-card {
        /* Ajustamos el ancho para que no ocupe toda la pantalla y se vea el siguiente */
        min-width: 260px; 
        max-width: 260px;
        background: var(--card);
        border-radius: 15px;
        overflow: hidden;
        border: 1px solid #334155;
        scroll-snap-align: center;
        transition: transform 0.3s ease;
    }

    video {
        width: 100%;
        /* CAMBIO CLAVE: Relación de aspecto vertical para TikTok */
        aspect-ratio: 9 / 16; 
        background: #000;
        display: block;
        object-fit: cover; /* Esto asegura que el video llene el contenedor */
    }

    .video-info {
        padding: 12px;
        font-size: 0.8rem;
        background: rgba(30, 41, 59, 0.8);
        color: var(--primary);
        font-weight: bold;
    }

    /* Optimización para móviles */
    @media (max-width: 768px) {
        .video-card {
            min-width: 75vw; /* El video ocupará el 75% del ancho de la pantalla */
        }
        h1 { font-size: 1.8rem; }
    }
</style>
