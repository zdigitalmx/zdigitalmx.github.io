        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; line-height: 1.6; scroll-behavior: smooth; }
        
        /* Top Bar */
        .top-bar { background: #020617; padding: 10px 5%; font-size: 0.85rem; display: flex; justify-content: space-between; flex-wrap: wrap; border-bottom: 1px solid var(--secondary); }
        .top-bar div { margin-right: 20px; color: #94a3b8; }
        .top-bar i { color: var(--primary); margin-right: 5px; }

        /* Header y Logo */
        header { position: sticky; top: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--secondary); z-index: 1000; }
        .logo { display: flex; align-items: center; gap: 12px; font-size: 1.8rem; font-weight: bold; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; text-decoration: none; }
        .logo img { height: 45px; width: auto; border-radius: 5px; }
        
        nav a { color: var(--text); text-decoration: none; margin-left: 20px; font-weight: 500; transition: 0.3s; }
        nav a:hover { color: var(--primary); }

        /* Contenedor de Galería */
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; text-align: center; }
        .bio-section { background: var(--card); padding: 30px; border-radius: 15px; margin: 20px auto; width: 90%; border: 1px solid #334155; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: var(--text); }
        .subtitle { color: var(--primary); font-size: 1.1rem; margin-bottom: 30px; }

        /* Carrusel de Videos */
        .video-carousel {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 20px 5px;
            scroll-snap-type: x mandatory;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        .video-carousel::-webkit-scrollbar { height: 6px; }
        .video-carousel::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .video-card {
            min-width: 300px;
            background: #0f172a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
            scroll-snap-align: start;
        }

        video { width: 100%; aspect-ratio: 16/9; display: block; background: #000; cursor: pointer; }
        .video-info { padding: 15px; font-size: 0.85rem; color: #94a3b8; text-align: left; }

        @media (max-width: 768px) {
            .top-bar { justify-content: center; text-align: center; gap: 5px; }
            header { flex-direction: column; gap: 15px; }
            nav a { margin: 0 10px; font-size: 0.9rem; }
            .video-card { min-width: 85%; }
        }
    </style>
